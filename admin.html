<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADMIN - ZONA LIBRE</title>
    <script>
    const usuarioActivo = JSON.parse(
        localStorage.getItem("usuarioActivo")
        );

        if(!usuarioActivo){

            window.location.href = "login.html";

        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    
    <main class="admin">

        <div class="container">

            <button
            class="btn-volver"
            onclick="window.location.href = 'index.html'">
            
                ← Volver a tienda

            </button>

            <h1>Panel Administrador</h1>
        </div>    

        <div class="dashboard-admin">
            <div class="dashboard-card">
                <h3 id="total-productos">0</h3>
                <p>Productos</p>
            </div>

            <div class="dashboard-card">
                <h3 id="total-ofertas">0</h3>
                <p>Ofertas</p>
            </div>

            <div class="dashboard-card">
                <h3 id="total-agotados">0</h3>
                <p>Agotados</p>
            </div>

            <div class="dashboard-card">
                <h3 id="stock-total">0</h3>
                <p>Stock Total</p>
            </div>
            
        </div>

        <!--Aqui inica el formulario-->

        <section class="admin-formulario">
            <h2>Agregar producto</h2>
            <form id="form-admin">

                <input 
                type="text"
                id="nombre"
                placeholder="Nombre producto"
                required>

                <input
                type="text"
                id="categoria"
                placeholder="Categoría"
                required>

                <input 
                type="number"
                id="precio"
                placeholder="Precio"
                required>

                <input 
                type="number"
                id="precio-oferta"
                placeholder="Precio oferta">
                <!--
                <input
                    type="number"
                    id="precio"
                    placeholder="Precio"
                >-->

                <input
                    type="number"
                    id="stock"
                    placeholder="Stock"
                    min="0"
                    required
                >
                <!--
                <input
                    type="number"
                    id="precio-oferta"
                    placeholder="Precio oferta"
                >-->

                <input 
                type="text"
                id="imagen"
                placeholder="URL imagen"
                required>

                <textarea 
                id="descripcion"
                placeholder="descripcion"
                required></textarea>

                <label>

                    <input type="checkbox" id="nuevo">
                    Nuevo Ingreso

                </label>
                <label>

                    <input type="checkbox" id="oferta">
                    Producto en oferta
                </label>
                <button type="submit">

                    Agregar producto

                </button>

            </form>
        </section>

        <section class="admin-productos">

            <h2>Productos actuales</h2>
            <div id="admin-productos">

            </div>

        </section>

        </div>

    </main>

    <script src="js/productos.js"></script>
    <script src="admin.js"></script>
</body>
</html>
